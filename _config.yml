# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site title and description
title:              PeerLadder
tagline:            Peer mentoring for underrepresented dRTPs
description:        Funded UK peer-mentoring programme for digital Research Technical Professionals (dRTPs) from underrepresented groups stepping into leadership.
lang:               en

# Site base hostname & protocol, e.g. http://example.com
url: 'https://peerladder.elixiruknode.org'

# Default Open Graph / SEO image used when sharing on social platforms
image: /img/logos/logo-peer-ladder-lavender.svg

# Site keywords (comma-separated, used by jekyll-seo-tag where supported)
keywords: 'PeerLadder, peer mentoring, dRTP, digital Research Technical Professionals, leadership programme, UK research, underrepresented groups, ELIXIR-UK, DisCouRSE, Open Life Science, OLS, psychological safety, RSE, bioinformatician, data steward'

# Site subpath, e.g. /blog
baseurl:            ""

# Permalink URLs structure, for permalink style options see: https://jekyllrb.com/docs/permalinks/
permalink: /:title/

logo: /img/logos/logo-peer-ladder-lavender.svg
logo2x: 
white_logo: 
white_logo2x: 


footer:
    copyright:    
# Social icons displayed in footer
social:
    facebook:     
    dribbble:
    instagram:     
    linkedin:      
    pinterest:      
    twitter:       
    vimeo:         
    youtube:

collections:
  docs:
    output: true
  people:
    output: true
    permalink: /people/:name/

# Disqus comments shortname, requires Disqus account https://disqus.com/
disqus:
    shortname:     #12345

# Google Analytics 4 (GA4) measurement ID. Loaded only after explicit consent via cookie banner.
google_analytics: G-5NG0FB9Q61

plugins:
  - jekyll-liquify
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules

sass:
  style: compressed
  silence_deprecations:
    - import

# Defaults
defaults:
  # _docs
  - scope:
      path: ""
      type: docs
    values:
      layout: doc
  # _posts
  - scope:
      path:         ""
      type:         posts
    values:
      layout:       post
  # _people
  - scope:
      path: ""
      type: people
    values:
      layout: person
