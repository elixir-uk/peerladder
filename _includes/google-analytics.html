<style>
.pl-cookie-banner {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: calc(100% - 32px);
    max-width: 400px;
    background: var(--color-bg-elevated);
    color: var(--color-text);
    padding: 18px 20px;
    border-radius: 6px;
    border: 1px solid var(--color-border-strong);
    box-shadow: var(--shadow-card);
    z-index: 9999;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.55;
    display: none;
}
.pl-cookie-banner.is-visible { display: block; }
.pl-cookie-banner__title { font-weight: 700; margin-bottom: 6px; font-size: 15px; }
.pl-cookie-banner__body { margin: 0 0 12px; }
.pl-cookie-banner__body a { color: var(--color-brand); text-decoration: underline; }
.pl-cookie-banner__body a:hover { color: var(--color-accent-strong); }
.pl-cookie-banner__buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.pl-cookie-banner__btn {
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
    transition: opacity 0.15s ease;
}
.pl-cookie-banner__btn:hover { opacity: 0.85; }
.pl-cookie-banner__btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
.pl-cookie-banner__btn--accept { background: var(--color-accent); color: var(--color-text-on-accent); }
.pl-cookie-banner__btn--decline { background: transparent; color: var(--color-text); border-color: var(--color-border-strong); }
</style>

<div id="plCookieBanner" class="pl-cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="pl-cookie-banner__title">A note on cookies</div>
    <p class="pl-cookie-banner__body">We'd like to use Google Analytics to understand how the site is used. With your consent, we'll set non-essential analytics cookies (anonymised IPs). See the <a href="https://elixiruknode.org/privacy-policy/" target="_blank" rel="noopener noreferrer">ELIXIR-UK privacy policy</a>.</p>
    <div class="pl-cookie-banner__buttons">
        <button class="pl-cookie-banner__btn pl-cookie-banner__btn--accept" id="plCookieAccept" type="button">Accept analytics</button>
        <button class="pl-cookie-banner__btn pl-cookie-banner__btn--decline" id="plCookieDecline" type="button">Decline</button>
    </div>
</div>

<script>
(function() {
    var STORAGE_KEY = 'pl_cookie_consent';
    var GA_ID = '{{ site.google_analytics }}';
    if (!GA_ID) return;

    function loadGA() {
        if (window.__plGaLoaded) return;
        window.__plGaLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', GA_ID, { anonymize_ip: true });
    }

    function getStored() {
        try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
    }
    function setStored(v) {
        try { localStorage.setItem(STORAGE_KEY, v); } catch (e) {}
    }

    var banner = document.getElementById('plCookieBanner');
    var stored = getStored();

    if (stored === 'accepted') {
        loadGA();
    } else if (stored !== 'declined' && banner) {
        banner.classList.add('is-visible');
    }

    var accept = document.getElementById('plCookieAccept');
    var decline = document.getElementById('plCookieDecline');
    if (accept) accept.addEventListener('click', function() {
        setStored('accepted');
        if (banner) banner.classList.remove('is-visible');
        loadGA();
    });
    if (decline) decline.addEventListener('click', function() {
        setStored('declined');
        if (banner) banner.classList.remove('is-visible');
    });

    // Footer link can call this to revisit choice
    window.plCookieSettings = function() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        if (banner) banner.classList.add('is-visible');
    };
})();
</script>
