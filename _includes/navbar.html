<nav class="navbar navbar-expand-lg menu_one dark_menu sticky-nav">
    <div class="container-fluid px-4">

        <a class="navbar-brand header_logo" href="{{ '/' | relative_url }}">
            <img class="main_logo" src="{{ site.logo | relative_url }}" alt="{{ site.title }}">
            <span class="header_wordmark">PeerLadder</span>
        </a>

        <button class="navbar-toggler collapsed" type="button"
                data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="menu_toggle">
                <span class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span class="hamburger-cross">
                    <span></span>
                    <span></span>
                </span>
            </span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav menu ml-auto">
                {% for item in site.data.navigation.left %}
                <li class="nav-item {% if item.dropdown %}dropdown submenu{% endif %} {% if page.url == item.url %}active{% endif %}">
                    <a class="nav-link {% if item.dropdown %}dropdown-toggle{% endif %}"
                       href="{{ item.url | relative_url }}">{{ item.title }}</a>
                    {% if item.dropdown %}
                    <i class="arrow_carrot-down_alt2 mobile_dropdown_icon" data-toggle="dropdown"></i>
                    <ul class="dropdown-menu">
                        {% for dropItem in item.dropdown %}
                        <li class="nav-item {% if page.url == dropItem.url %}active{% endif %}">
                            <a href="{{ dropItem.url | relative_url }}" class="nav-link">{{ dropItem.title }}</a>
                        </li>
                        {% endfor %}
                    </ul>
                    {% endif %}
                </li>
                {% endfor %}
                <li class="nav-item theme-toggle-item">
                    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch colour theme" aria-pressed="false">
                        <svg class="theme-toggle__icon theme-toggle__icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="theme-toggle__icon theme-toggle__icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                        <span class="visually-hidden">Toggle theme</span>
                    </button>
                </li>
            </ul>
        </div>

    </div>
</nav>
