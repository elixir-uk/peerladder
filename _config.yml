# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site title and description
title:              PeerLadder
description:        A UK peer-mentoring programme for underrepreented dRTPs
lang:               en

# Site base hostname & protocol, e.g. http://example.com
url: ''

# Site subpath, e.g. /blog
baseurl:            ""

# Permalink URLs structure, for permalink style options see: https://jekyllrb.com/docs/permalinks/
permalink: /:title/

logo: /img/logos/logo-peer-ladder.svg
logo2x: 
white_logo: 
white_logo2x: 


footer:
    copyright:    
# Social icons displayed in footer
social:
    facebook:     
    dribbble:
    instagram:     
    linkedin:      
    pinterest:      
    twitter:       
    vimeo:         
    youtube:

collections:
  docs:
    output: true
  people:
    output: true
    permalink: /people/:name/

# Disqus comments shortname, requires Disqus account https://disqus.com/
disqus:
    shortname:     #12345

# Google Analytics
google_analytics: #UA—XXXXXXXX-X

plugins:
  - jekyll-liquify
  - jekyll-seo-tag

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules

sass:
  style: compressed
  silence_deprecations:
    - import

# Defaults
defaults:
  # _docs
  - scope:
      path: ""
      type: docs
    values:
      layout: doc
  # _posts
  - scope:
      path:         ""
      type:         posts
    values:
      layout:       post
  # _people
  - scope:
      path: ""
      type: people
    values:
      layout: person
